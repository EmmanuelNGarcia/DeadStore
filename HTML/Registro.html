<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadStore | Registro</title>
  <link rel="stylesheet" href="../CSS/RegistroCSS.css">
  <link rel="stylesheet" href="../CSS/Principal.css"> </head>
<body>
  <div id="Encabezado">
     <h1 id="title">DeadStore</h1>
  </div>

  <form id="registroForm">
    <h2>Registro</h2>
    
    <label for=\"nombre\">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}" required placeholder="10 dígitos">

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Registrarme</button>
    <p style="text-align: center; margin-top: 15px; font-size: 13px;">
        <a href="IniciarSesion.html" style="color: black;">¿Ya tienes cuenta? Inicia sesión</a>
    </p>
  </form>

  <script src="../JS/scriptRegistro.js"></script>
</body>
</html>
