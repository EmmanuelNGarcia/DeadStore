<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Principal.css">
    <title>DeadStore | Camisetas</title>
</head>
<body>
    <header>
        <div id="Encabezado">
            <h1 id="title">DeadStore</h1>
            <ul>
                <li><a href="index.html">Hombre</a></li>
                <li><a href="indexM.html">Mujer</a></li>
            </ul>
            
            <div class="icon-group">
                <button class="user-btn" id="userBtn" title="Usuario"></button>
                <button class="cart-btn" onclick="window.location.href='carrito.html'" title="Ver Cesta"></button>
            </div>
            <div class="user-menu" id="userMenu"></div>
        </div>
    </header>
    
    <nav>
        <div id="catalogo">
            <h2 style="margin-top: 30px; font-weight: 400; text-transform: uppercase; text-align: center;">Camisetas</h2>
            
            <div class="grid-productos">
                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img14.jpg" alt="Camiseta Básica Blanca">
                        <h3>Camiseta Básica Blanca</h3>
                        <p>$299</p>
                    </a>
                    <select class="selector-talla" id="talla-cam1">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    <button class="btn-cesta" onclick="agregarAlCarrito('Camiseta Básica Blanca', 299, 'talla-cam1')">Añadir a la cesta</button>
                </div>

                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img15.jpg" alt="Camiseta Estampada Vintage">
                        <h3>Camiseta Estampada Vintage</h3>
                        <p>$349</p>
                    </a>
                    <select class="selector-talla" id="talla-cam2">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    <button class="btn-cesta" onclick="agregarAlCarrito('Camiseta Estampada Vintage', 349, 'talla-cam2')">Añadir a la cesta</button>
                </div>
                
                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img16.jpg" alt="Camiseta Oversize Negra">
                        <h3>Camiseta Oversize Negra</h3>
                        <p>$299</p>
                    </a>
                    <select class="selector-talla" id="talla-cam3">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    <button class="btn-cesta" onclick="agregarAlCarrito('Camiseta Oversize Negra', 299, 'talla-cam3')">Añadir a la cesta</button>
                </div>
            </div>
        </div>
    </nav>
    
    <footer>
        <p style="text-align: center; margin-top: 50px; padding-bottom: 20px; color: gray; font-size: 12px; text-transform: uppercase;">© 2026 DeadStore</p>
    </footer>

    <script src="../JS/scriptPrincipal.js"></script>
</body>
</html>
