<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Principal.css">
    <title>DeadStore | Chamarras</title>
</head>
<body>
    <header>
        <div id="Encabezado">
            <h1 id="title">DeadStore</h1>
            <ul>
                <li><a href="index.html">Hombre</a></li>
                <li><a href="indexM.html">Mujer</a></li>
            </ul>
            
            <div class="icon-group">
                <button class="user-btn" id="userBtn" title="Usuario"></button>
                <button class="cart-btn" onclick="window.location.href='carrito.html'" title="Ver Cesta"></button>
            </div>
            <div class="user-menu" id="userMenu"></div>
        </div>
    </header>
    
    <nav>
        <div id="catalogo">
            <h2 style="margin-top: 30px; font-weight: 400; text-transform: uppercase; text-align: center;">Chamarras</h2>
            
            <div class="grid-productos">
                
                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img27.webp" alt="Chamarra Puffer">
                        <h3>Chamarra Puffer</h3>
                        <p>$1199</p>
                    </a>
                    
                    <select class="selector-talla" id="talla-chamarra1">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    
                    <button class="btn-cesta" onclick="agregarAlCarrito('Chamarra Puffer', 1199, 'talla-chamarra1')">Añadir a la cesta</button>
                </div>

                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img28.webp" alt="Chamarra de Mezclilla">
                        <h3>Chamarra de Full Black</h3>
                        <p>$899</p>
                    </a>
                    
                    <select class="selector-talla" id="talla-chamarra2">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    
                    <button class="btn-cesta" onclick="agregarAlCarrito('Chamarra de Full Black', 899, 'talla-chamarra2')">Añadir a la cesta</button>
                </div>

                <div class="producto">
                    <a href="#">
                        <img src="../RESOURCE/img29.webp" alt="Chamarra Bomber">
                        <h3>Chamarra Bomber</h3>
                        <p>$949</p>
                    </a>
                    
                    <select class="selector-talla" id="talla-chamarra3">
                        <option value="" disabled selected>Selecciona tu talla</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    
                    <button class="btn-cesta" onclick="agregarAlCarrito('Chamarra Bomber', 949, 'talla-chamarra3')">Añadir a la cesta</button>
                </div>

            </div>
        </div>
    </nav>
    
    <footer>
        <p style="text-align: center; margin-top: 50px; padding-bottom: 20px; color: gray; font-size: 12px; text-transform: uppercase;">© 2026 DeadStore</p>
    </footer>

    <script src="../JS/scriptPrincipal.js"></script>
</body>
</html>
